<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solutions | Vesta Pacific Tech</title>
    <style>
        :root {
            --accent: #0071e3; --bg: #000; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --text-gray: #86868b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, sans-serif; line-height: 1.6; }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo img { height: 40px; }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .btn-quote { background: var(--accent); padding: 10px 22px; border-radius: 20px; font-weight: 600; text-decoration: none; color: #fff; }

        /* --- Header --- */
        .solutions-header { padding: 180px 8% 60px; text-align: center; background: radial-gradient(circle at top, #111 0%, #000 100%); }
        .solutions-header h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 700; }

        /* --- Project Gallery --- */
        .gallery-section { padding: 80px 8%; }
        .section-tag { color: var(--accent); font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-top: 40px; }
        
        .project-card { 
            background: var(--glass); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; transition: 0.4s;
        }
        .project-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        /* Görsel Alanı (Görselleri yüklediğinde buradaki img src'leri değiştirebilirsin) */
        .project-img { 
            width: 100%; height: 250px; background: #111; object-fit: cover; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold;
        }

        .project-info { padding: 30px; }
        .project-info h3 { margin-bottom: 10px; font-size: 1.4rem; }
        .project-info p { color: var(--text-gray); font-size: 0.95rem; margin-bottom: 15px; }
        .tech-tag { font-size: 0.75rem; background: rgba(0, 113, 227, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 12px; font-weight: 600; }

        footer { padding: 60px 8%; text-align: center; border-top: 1px solid #111; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="Vesta Pacific Tech"></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="solutions.html" style="color: var(--accent); opacity: 1;">Solutions</a>
            <a href="software.html">Cloud OS</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="btn-quote">Get a Quote</a>
        </div>
    </nav>

    <header class="solutions-header">
        <h1>Our Portfolio</h1>
        <p>Real-world deployments powered by Vesta Pacific Tech and Xibo CMS.</p>
    </header>

    <section class="gallery-section">
        <span class="section-tag">Featured Work</span>
        <div class="project-grid">
