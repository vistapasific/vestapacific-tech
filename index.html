<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vesta Pacific Tech | Enterprise Digital Signage San Diego</title>
    <style>
        :root {
            --accent: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.4);
            --bg: #050505;
            --border: rgba(255, 255, 255, 0.1);
            --text-gray: #86868b;
        }

        /* Temel Sıfırlama */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; height: 100%; }
        html { scroll-behavior: smooth; }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            line-height: 1.6;
            /* Arka plan dokusu sabit ve en arkada */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 113, 227, 0.1) 0%, transparent 80%),
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px;
            background-attachment: fixed;
        }

        /* --- Navigasyon (En Üstte Sabit) --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000; /* En önde olmalı */
            border-bottom: 1px solid var(--border);
        }

        .nav-logo img { height: 45px; width: auto; display: block; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.95rem; opacity: 0.8; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .btn-quote {
            background: var(--accent);
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none !important;
            color: #fff !important;
            transition: 0.3s;
        }

        /* --- Hero Section (Görünürlüğü Artırıldı) --- */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 10% 40px; /* Üstten padding eklendi (nav altında kalmasın) */
            position: relative;
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); letter-spacing: -0.05em; margin-bottom: 25px; font-weight: 700; }
        .hero p { color: var(--text-gray); max-width: 700px; font-size: 1.3rem; margin-bottom: 45px; }

        /* --- Hizmetler Grid --- */
        section { padding: 100px 8%; position: relative; }
        .section-tag { color: var(--accent); font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; }
        .section-title { font-size: 2.8rem; margin-bottom: 60px; font-weight: 700; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            height: 420px;
            border-radius: 25px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 35px;
            text-decoration: none;
            color: #fff;
            transition: 0.4s ease;
            background-color: #111;
            background-size: cover;
            background-position: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 1;
        }

        .card-content { position: relative; z-index: 2; }
        .card h3 { margin-bottom: 8px; font-size: 1.7rem; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }

        footer { padding: 80px 8% 40px; background: #050505; text-align: center; border-top: 1px solid #111; }

        /* Mobilde de Görünürlük Garantisi */
        @media (max-width: 768px) {
            nav { padding: 15px 5%; }
            .nav-logo img { height: 35px; }
            .nav-links { gap: 15px; }
            .nav-links a:not(.btn-quote) { font-size: 0.8rem; }
            .hero h1 { font-size: 2.8rem; }
        }
    </style>
</head>
