<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesta Pacific Tech | Enterprise Digital Signage</title>
    <style>
        :root {
            --accent: #0071e3;
            --bg-dark: #000000;
            /* Spotlight efekti: Merkeze hafif bir lacivert dokunuş */
            --spotlight: radial-gradient(circle at 50% 40%, #161617 0%, #000000 70%);
            --text-gray: #a1a1a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark);
            background-image: var(--spotlight);
            background-attachment: fixed;
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 8%; /* PC'de daha ferah */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* PC Logo: Daha kurumsal ve büyük */
        .nav-logo img { 
            height: 70px; /* PC için ciddi bir boyut */
            width: auto; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { 
            color: #fff; text-decoration: none; font-size: 1.1rem; 
            opacity: 0.8; transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .btn-quote {
            background: var(--accent);
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 { 
            font-size: clamp(3rem, 8vw, 6rem); 
            letter-spacing: -0.05em; 
            margin-bottom: 25px; 
            font-weight: 700;
            /* Başlığa "metalik" bir parlama verdik */
            background: linear-gradient(180deg, #ffffff 40%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p { color: var(--text-gray); max-width: 800px; font-size: 1.5rem; margin-bottom: 45px; }

        /* --- Mobil Ayarları --- */
        @media (max-width: 768px) {
            nav { padding: 15px 6%; }
            .nav-logo img { height: 45px; } /* Mobilde yine makul boyutta */
            .nav-links { gap: 15px; }
            .nav-links a:not(.btn-quote) { display: none; }
            .hero h1 { font-size: 3.5rem; }
            .hero p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="assets/logo.png" alt="Vesta Pacific Tech" onerror="this.style.display='none'; this.after('VP TECH')">
        </a>
        <div class="nav-links">
            <a href="#solutions">Solutions</a>
            <a href="mailto:info@vestapacific.tech">Cloud OS</a>
            <a href="mailto:info@vestapacific.tech" class="btn-quote">Get a Quote</a>
        </div>
    </nav>

    <section class="hero">
        <span style="color: var(--accent); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; font-size: 0.9rem;">San Diego, CA</span>
        <h1>Intelligence on Display.</h1>
        <p>Designing high-performance visual networks and enterprise digital environments for premium brands.</p>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <a href="#solutions" class="btn-quote" style="padding: 18px 45px;">Explore Solutions</a>
            <a href="mailto:info@vestapacific.tech" style="color: #fff; text-decoration: none; padding: 18px 45px; border: 1px solid #444; border-radius: 35px; font-weight: 500; background: rgba(255,255,255,0.03); transition: 0.3s;">Contact Us</a>
        </div>
    </section>

</body>
</html>
