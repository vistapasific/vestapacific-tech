<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesta Pacific Tech</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container { 
            text-align: center;
            padding: 20px;
        }

        .logo-img {
            width: 300px; /* Logoyu buradan büyütebilirsin */
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(0, 113, 227, 0.4));
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 700;
            letter-spacing: -1px; 
            margin-bottom: 15px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            color: #a1a1a6; 
            max-width: 500px; 
            margin: 0 auto;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" alt="Vesta Pacific Tech Logo" class="logo-img">
        
        <h1>Display Perfection.</h1>
        <p>Smart screen solutions for modern business. High-impact digital signage for showrooms and offices.</p>
        
        <div class="footer">
            &copy; 2026 VESTA PACIFIC TECH // SAN DIEGO
        </div>
    </div>

</body>
</html>
