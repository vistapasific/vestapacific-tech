<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesta Pacific Tech | Enterprise Digital Signage San Diego</title>
    <style>
        :root {
            --accent: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.4);
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-gray: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo img { height: 40px; transition: 0.3s; }
        .nav-logo img:hover { transform: scale(1.05); }
        
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { 
            color: #fff; text-decoration: none; font-size: 0.9rem; 
            opacity: 0.8; transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .btn-quote {
            background: var(--accent);
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }
        .btn-quote:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); letter-spacing: -0.05em; margin-bottom: 20px; font-weight: 700; }
        .hero p { color: var(--text-gray); max-width: 650px; font-size: 1.3rem; margin-bottom: 40px; }

        /* --- Section Styling --- */
        section { padding: 120px 8%; border-bottom: 1px solid #111; }
        .section-tag { color: var(--accent); font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .section-title { font-size: 2.8rem; margin-bottom: 60px; font-weight: 700; }

        /* --- Visual Excellence Grid --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            height: 400px;
            border-radius: 30px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 40px;
            text-decoration: none;
            color: #fff;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover;
            background-position: center;
        }

        /* Kart Karartma Katmanı */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%);
            transition: 0.5s;
            z-index: 1;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card:hover::before { background: linear-gradient(to top, rgba(0, 113, 227, 0.4) 0%, rgba(0,0,0,0.3) 100%); }

        .card-content { position: relative; z-index: 2; }
        .card h3 { margin-bottom: 10px; font-size: 1.8rem; font-weight: 600; }
        .card p { color: #ccc; font-size: 1rem; opacity: 0.9; }

        /* --- Platform Section --- */
        .platform-box {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        /* --- Contact Form --- */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-gray); }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            border-radius: 12px; color: #fff; font-family: inherit; font-size: 1rem;
        }
        .form-group input:focus, .form-group textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

        /* --- Footer --- */
        footer { padding: 80px 8% 40px; background: #050505; text-align: center; color: #444; border-top: 1px solid #111; }
        .footer-links { margin-bottom: 30px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .footer-links a:hover { color: #fff; }

        @media (max-width: 768px) {
            nav { padding: 15px 5%; }
            .nav-links { display: none; } 
            .contact-container { grid-template-columns: 1fr; padding: 30px; }
            .hero h1 { font-size: 3rem; }
            section { padding: 80px 5%; }
            .card { height: 350px; }
        }
    </style>
</head>
